<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header>
      <label for="search">Enter a location!</label>
      <input type="search" name="search" id="search" />
      <button type="button">Go</button>
      <dialog id="error">You shouldn't be seeing this!</dialog>
    </header>

    <div class="content">
      <h1>The Weather of <span id="location">Johnathan</span>:</h1>
      <div class="main-content">
        <div class="upper-content">
          <img src="data:," alt="partly cloudy day" id="icon" />
          <div class="all-temps">
            <p><span class="current">73</span><span class="temp">°F</span></p>
            <div class="minmax">
              <p><span class="max">99</span><span class="temp">°F</span></p>
              <p><span class="min">36</span><span class="temp">°F</span></p>
            </div>
          </div>
        </div>
        <p class="desc">Similar temperatures continuing with a chance of rain tomorrow, Monday & Tuesday.</p>
      </div>
    </div>
  </body>
</html>
